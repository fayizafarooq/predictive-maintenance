name: Daily Predictive Maintenance

on:
  schedule:
    - cron: '0 9 * * *'   # runs every day at 9:00 AM UTC = 12:00 PM Bahrain time
  workflow_dispatch:        # allows you to run it manually from GitHub too

jobs:
  run-daily-predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn xgboost

      - name: Run daily_predict.py
        run: |
          cd notebooks
          python daily_predict.py

      - name: Commit updated files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add notebooks/equipment_failure_predictions.csv
          git add notebooks/machine_states.csv
          git add docs/at_risk_machines.json
          git diff --staged --quiet || git commit -m "Auto update: daily predictions $(date +'%Y-%m-%d')"
          git push
